name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend — install, lint, build, test
        working-directory: backend
        run: |
          npm ci
          npm run lint
          npm run build
          npm test

      - name: Cell SPA — build
        working-directory: frontend/spa
        run: |
          npm ci
          npm run build

      - name: Admin dashboard — build
        working-directory: frontend/admin
        run: |
          npm ci
          npm run build

      - name: Educational site — build
        working-directory: site
        run: |
          npm ci
          npm run build
