<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Architecture - Routing</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            margin-bottom: 1rem;
        }
        .status {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255, 59, 48, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }
        .cell-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }
        .retry-button {
            background: white;
            color: #667eea;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        .retry-button:hover {
            transform: scale(1.05);
        }
        .client-input-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            margin-top: 2rem;
        }
        .client-input-section h2 {
            margin-bottom: 1rem;
            color: white;
        }
        .input-group {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            align-items: center;
        }
        .client-input {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
        }
        .route-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .route-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        .routing-result {
            background: rgba(255, 255, 255, 0.15);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }
        .routing-result.success {
            border-left: 4px solid #43e97b;
        }
        .routing-result.error {
            border-left: 4px solid #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-4px"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a13.5 13.5 0 0 1 0 18 13.5 13.5 0 0 1 0-18Z"/></svg> Cell Architecture Router</h1>
        <div class="status" id="status">Welcome to the Cell Router</div>
        <div class="spinner" id="spinner" style="display: none;"></div>
        <div id="cellInfo"></div>
        <div id="error"></div>
        
        <!-- Client ID Input Section -->
        <div class="client-input-section" id="clientInputSection">
            <h2><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-3px"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg> Direct Client Routing</h2>
            <p>Enter a client ID to see which cell it routes to:</p>
            <div class="input-group">
                <input type="text" id="clientIdInput" placeholder="Enter client ID (e.g., user123)" class="client-input">
                <button onclick="routeSpecificClient()" class="route-btn">Route Now</button>
            </div>
            <div id="routingResult"></div>
        </div>
        <p id="introLink" style="margin-top: 1.5rem; font-size: 0.9rem;">
            <a href="%%INTRO_URL%%" style="color: #fff; opacity: 0.85;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><path d="M2 5h6a4 4 0 0 1 4 4v11a3 3 0 0 0-3-3H2V5ZM22 5h-6a4 4 0 0 0-4 4v11a3 3 0 0 1 3-3h7V5Z"/></svg> New to cell architecture? Start with the interactive guide</a>
        </p>
    </div>
    <script>
        // Hide the guide link when no intro URL was substituted at deploy time
        (function () {
            var link = document.querySelector('#introLink a');
            if (!link || link.getAttribute('href').indexOf('%%') === 0 || link.getAttribute('href') === '') {
                document.getElementById('introLink').style.display = 'none';
            }
        })();
    </script>

    <script>
        // ROUTING_API_URL is substituted by infrastructure/scripts/deploy-frontend.sh
        // from the routing stack's API endpoint at deploy time.
        const ROUTING_API_URL = '%%ROUTING_API_URL%%';

        function getApiUrl() {
            if (window.location.hostname === 'localhost') {
                return 'http://localhost:3000/prod';
            }
            return ROUTING_API_URL;
        }

        // Cache of cell URLs from the admin API, keyed by cellId
        let cellUrlCache = {};

        async function fetchCellUrls() {
            const response = await fetch(`${getApiUrl()}/admin/cell-urls`);
            if (!response.ok) {
                throw new Error('Unable to fetch cell URLs');
            }
            const data = await response.json();
            cellUrlCache = {};
            for (const cell of data.cellUrls) {
                cellUrlCache[cell.cellId] = cell;
            }
            return data.cellUrls;
        }

        // Get or generate client ID
        function getClientId() {
            let clientId = localStorage.getItem('cellClientId');
            if (!clientId) {
                clientId = 'client-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('cellClientId', clientId);
            }
            return clientId;
        }

        // Update status message
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // Show error
        function showError(message) {
            const spinner = document.getElementById('spinner');
            if (spinner) spinner.style.display = 'none';
            document.getElementById('error').innerHTML = `
                <div class="error">
                    <p><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg> ${message}</p>
                    <button class="retry-button" onclick="routeToCell()">Retry</button>
                </div>
            `;
        }

        // Show cell info
        function showCellInfo(cellData) {
            document.getElementById('cellInfo').innerHTML = `
                <div class="cell-info">
                    <p><strong>Your ID:</strong> ${cellData.clientId}</p>
                    <p><strong>Assigned Cell:</strong> ${cellData.targetCell.cellId}</p>
                    <p><strong>Region:</strong> ${cellData.targetCell.region}</p>
                    <p><strong>AZ:</strong> ${cellData.targetCell.availabilityZone}</p>
                </div>
            `;
        }

        // Route a specific client ID
        async function routeSpecificClient() {
            const clientIdInput = document.getElementById('clientIdInput');
            const clientId = clientIdInput.value.trim();

            if (!clientId) {
                showRoutingResult('Please enter a client ID', false);
                return;
            }

            try {
                const response = await fetch(`${getApiUrl()}/admin/client-route/${clientId}`);
                if (!response.ok) {
                    throw new Error('Routing lookup failed');
                }

                const data = await response.json();
                const targetCell = data.targetCell;
                await fetchCellUrls();
                const cellUrl = cellUrlCache[targetCell.cellId] ? cellUrlCache[targetCell.cellId].directUrl : '';

                showRoutingResult(`
                    <div>
                        <h3><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-3px"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg> Routing Result for "${clientId}"</h3>
                        <p><strong>Target Cell:</strong> ${targetCell.cellId}</p>
                        <p><strong>Region:</strong> ${targetCell.region}</p>
                        <p><strong>Availability Zone:</strong> ${targetCell.availabilityZone}</p>
                        <p><strong>Hash Value:</strong> ${data.hashValue}</p>
                        ${cellUrl ? `
                        <p><strong>Cell URL:</strong>
                            <a href="${cellUrl}"
                               style="color: #43e97b; text-decoration: underline;"
                               target="_blank">
                               ${cellUrl}
                            </a>
                        </p>
                        <button onclick="redirectToCell('${targetCell.cellId}')" class="retry-button">
                            Go to Cell Now
                        </button>` : ''}
                    </div>
                `, true);

            } catch (error) {
                showRoutingResult(`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg> Error: ${error.message}`, false);
            }
        }

        function showRoutingResult(content, isSuccess) {
            const resultDiv = document.getElementById('routingResult');
            resultDiv.innerHTML = content;
            resultDiv.className = 'routing-result ' + (isSuccess ? 'success' : 'error');
        }

        function redirectToCell(cellId) {
            const cell = cellUrlCache[cellId];
            if (!cell) return;
            const urlClientId = document.getElementById('clientIdInput').value || getClientId();
            window.location.href = `${cell.directUrl}?clientId=${encodeURIComponent(urlClientId)}`;
        }

        // Show client input section after initial routing
        function showClientInputSection() {
            document.getElementById('clientInputSection').style.display = 'block';
        }

        // Route the current browser's client ID and offer a redirect
        async function routeToCell() {
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('error').innerHTML = '';

            const clientId = getClientId();
            updateStatus(`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><path d="M20.5 12a8.5 8.5 0 1 1-2.6-6.1L20.5 8"/><path d="M20.5 3.5V8H16"/></svg> Routing ${clientId} to optimal cell...`);

            try {
                const response = await fetch(`${getApiUrl()}/admin/client-route/${clientId}`);
                if (!response.ok) {
                    throw new Error('Routing service unavailable');
                }

                const routingData = await response.json();
                showCellInfo(routingData);

                await fetchCellUrls();
                const targetCell = cellUrlCache[routingData.targetCell.cellId];

                if (!targetCell || !targetCell.active) {
                    throw new Error('Target cell is not available');
                }

                updateStatus(`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.7 2.7L16.5 9"/></svg> Ready! You'll be redirected to ${targetCell.cellId}...`);

                // Show the client input section after successful routing
                showClientInputSection();

                // Add manual redirect button instead of auto-redirect
                const redirectButton = document.createElement('button');
                redirectButton.className = 'retry-button';
                redirectButton.textContent = `Go to ${targetCell.cellId} Now`;
                redirectButton.style.marginTop = '1rem';
                redirectButton.onclick = () => {
                    window.location.href = `${targetCell.directUrl}?clientId=${encodeURIComponent(clientId)}`;
                };
                document.getElementById('cellInfo').appendChild(redirectButton);
                document.getElementById('spinner').style.display = 'none';

            } catch (error) {
                console.error('Routing error:', error);
                showError(error.message || 'Unable to route to cell');
                showClientInputSection(); // Show even on error
                document.getElementById('spinner').style.display = 'none';
            }
        }

        // Enter key support for client input
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('clientIdInput');
            if (input) {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        routeSpecificClient();
                    }
                });
            }
        });

        // Show input section and add route current client button
        window.addEventListener('load', function() {
            const spinner = document.getElementById('spinner');
            if (spinner) spinner.style.display = 'none';

            // Add a button to route current client
            const currentClientSection = document.createElement('div');
            currentClientSection.innerHTML = `
                <div style="margin: 2rem 0; padding: 1.5rem; background: rgba(255, 255, 255, 0.1); border-radius: 15px;">
                    <h3 style="margin-bottom: 1rem;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-3px"><rect x="3.5" y="3.5" width="17" height="17" rx="3.5"/><circle cx="8.5" cy="8.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="0.9" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="0.9" fill="currentColor" stroke="none"/></svg> Route Your Client ID</h3>
                    <p style="margin-bottom: 1rem; opacity: 0.8;">Your current client ID: <strong>${getClientId()}</strong></p>
                    <button onclick="routeToCell()" class="route-btn" style="padding: 0.75rem 2rem;">
                        Route Me to a Cell
                    </button>
                    <p style="margin-top: 1rem; font-size: 0.9rem; opacity: 0.7;">
                        Or use the form below to test any client ID
                    </p>
                </div>
            `;
            document.getElementById('clientInputSection').parentElement.insertBefore(
                currentClientSection,
                document.getElementById('clientInputSection')
            );
        });
    </script>
    <script src="/demo-panel-embed.js"></script>
</body>
</html>
