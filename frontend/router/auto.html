<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Architecture - Auto Router</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            /* top padding clears the fixed demo banner */
            padding: 76px 1rem 2rem;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 500px;
        }
        h1 {
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .status {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .cell-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 1rem;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cell-info p {
            margin: 0.5rem 0;
            font-size: 1.1rem;
        }
        .countdown {
            font-size: 3rem;
            font-weight: bold;
            color: #43e97b;
            margin: 1rem 0;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .skip-button {
            background: white;
            color: #667eea;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
            font-weight: bold;
        }
        .skip-button:hover {
            transform: scale(1.05);
        }
        .error {
            background: rgba(255, 59, 48, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }
        /* ---------- Demo banner ---------- */
        .demo-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0 1.25rem;
            background: rgba(30, 30, 46, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
        }
        .banner-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .banner-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #43e97b;
        }
        .banner-menu {
            position: relative;
        }
        .banner-menu-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .banner-menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .banner-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            min-width: 200px;
            display: flex;
            flex-direction: column;
            padding: 0.35rem;
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.45);
            text-align: left;
        }
        .banner-dropdown a {
            padding: 0.5rem 0.75rem;
            border-radius: 7px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.15s ease;
        }
        .banner-dropdown a:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        /* the class display:flex outranks the UA [hidden] rule */
        .banner-dropdown[hidden] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="demo-banner">
        <span class="banner-brand"><span class="banner-dot"></span> Cell Demo · Auto-router</span>
        <div class="banner-menu" id="bannerMenu">
            <button class="banner-menu-btn" id="bannerMenuBtn" aria-haspopup="true" aria-expanded="false">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                Menu
            </button>
            <div class="banner-dropdown" id="bannerDropdown" role="menu" hidden>
                <a role="menuitem" class="intro-dependent" href="%%INTRO_URL%%" target="_blank" rel="noopener noreferrer">Interactive guide</a>
                <a role="menuitem" class="intro-dependent" href="%%INTRO_URL%%/primer.html" target="_blank" rel="noopener noreferrer">Primer</a>
                <a role="menuitem" class="intro-dependent" href="%%INTRO_URL%%/slides.html" target="_blank" rel="noopener noreferrer">Slides</a>
                <a role="menuitem" href="/">Admin dashboard</a>
                <a role="menuitem" href="./index.html">Router page</a>
            </div>
        </div>
    </div>
    <script>
        // Plain-JS dropdown: toggles on the button, closes on outside click and
        // Escape. Entries that need the intro site hide themselves when no
        // %%INTRO_URL%% was substituted at deploy time (same pattern as the
        // router page's #introLink script).
        (function () {
            var btn = document.getElementById('bannerMenuBtn');
            var dropdown = document.getElementById('bannerDropdown');
            var menu = document.getElementById('bannerMenu');
            dropdown.querySelectorAll('a.intro-dependent').forEach(function (a) {
                var href = a.getAttribute('href') || '';
                if (href.indexOf('%%') === 0 || href === '') a.style.display = 'none';
            });
            function setOpen(open) {
                dropdown.hidden = !open;
                btn.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            btn.addEventListener('click', function () { setOpen(dropdown.hidden); });
            document.addEventListener('click', function (e) {
                if (!menu.contains(e.target)) setOpen(false);
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') setOpen(false);
            });
        })();
    </script>
    <div class="container">
        <h1><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-4px"><circle cx="12" cy="12" r="9"/><path d="M8 12h8m0 0-3-3m3 3-3 3"/></svg> Auto-Routing Active</h1>
        <div class="status" id="status">Finding your optimal cell...</div>
        <div class="spinner" id="spinner"></div>
        <div id="cellInfo"></div>
        <div id="countdown"></div>
        <div id="error"></div>
    </div>

    <script>
        let countdownInterval;
        let redirectTimeout;

        // Get or generate client ID
        function getClientId() {
            let clientId = localStorage.getItem('cellClientId');
            if (!clientId) {
                clientId = 'client-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('cellClientId', clientId);
            }
            return clientId;
        }

        // Update status message
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // Show error
        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('error').innerHTML = `
                <div class="error">
                    <p><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg> ${message}</p>
                    <button class="skip-button" onclick="location.reload()">Try Again</button>
                </div>
            `;
        }

        // Show countdown
        function showCountdown(seconds, targetUrl, clientId) {
            const countdownDiv = document.getElementById('countdown');
            countdownDiv.innerHTML = `
                <div class="countdown" id="countdownNumber">${seconds}</div>
                <button class="skip-button" onclick="skipCountdown('${targetUrl}', '${clientId}')">Skip Countdown</button>
            `;
            
            let remaining = seconds;
            countdownInterval = setInterval(() => {
                remaining--;
                document.getElementById('countdownNumber').textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    window.location.href = `${targetUrl}?clientId=${encodeURIComponent(clientId)}`;
                }
            }, 1000);
        }

        // Skip countdown
        function skipCountdown(targetUrl, clientId) {
            if (countdownInterval) clearInterval(countdownInterval);
            if (redirectTimeout) clearTimeout(redirectTimeout);
            window.location.href = `${targetUrl}?clientId=${encodeURIComponent(clientId)}`;
        }

        // Show cell info
        function showCellInfo(cellData, targetUrl, clientId) {
            document.getElementById('cellInfo').innerHTML = `
                <div class="cell-info">
                    <h2><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.7 2.7L16.5 9"/></svg> Cell Assigned!</h2>
                    <p><strong>Your ID:</strong> ${clientId}</p>
                    <p><strong>Target Cell:</strong> ${cellData.targetCell.cellId}</p>
                    <p><strong>Region:</strong> ${cellData.targetCell.region}</p>
                    <p><strong>Zone:</strong> ${cellData.targetCell.availabilityZone}</p>
                </div>
            `;
            
            showCountdown(5, targetUrl, clientId);
        }

        // Route to appropriate cell
        async function routeToCell() {
            const clientId = getClientId();
            updateStatus(`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><path d="M20.5 12a8.5 8.5 0 1 1-2.6-6.1L20.5 8"/><path d="M20.5 3.5V8H16"/></svg> Routing ${clientId} to optimal cell...`);

            try {
                // ROUTING_API_URL is substituted by infrastructure/scripts/deploy-frontend.sh
                // from the routing stack's API endpoint at deploy time.
                const apiUrl = window.location.hostname === 'localhost'
                    ? 'http://localhost:3000/prod'
                    : '%%ROUTING_API_URL%%';

                // Get routing decision
                const response = await fetch(`${apiUrl}/admin/client-route/${clientId}`);
                if (!response.ok) {
                    throw new Error('Routing service unavailable');
                }

                const routingData = await response.json();

                // Get cell URLs to determine redirect target
                const cellUrlsResponse = await fetch(`${apiUrl}/admin/cell-urls`);
                if (!cellUrlsResponse.ok) {
                    throw new Error('Unable to fetch cell URLs');
                }

                const cellUrlsData = await cellUrlsResponse.json();
                const targetCell = cellUrlsData.cellUrls.find(
                    cell => cell.cellId === routingData.targetCell.cellId
                );

                if (!targetCell || !targetCell.active) {
                    throw new Error('Target cell is not available');
                }

                document.getElementById('spinner').style.display = 'none';
                updateStatus(`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2.5px"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg> Redirecting to ${targetCell.cellId} in...`);
                showCellInfo(routingData, targetCell.directUrl, clientId);

            } catch (error) {
                console.error('Routing error:', error);
                showError(error.message || 'Unable to route to cell');
            }
        }

        // Start routing immediately on page load
        window.addEventListener('load', routeToCell);
    </script>
    <script src="/demo-panel-embed.js"></script>
</body>
</html>
