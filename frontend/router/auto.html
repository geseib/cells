        // pattern and localStorage key as the educational site and admin).

            if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
        } catch (e) {}
    </script>
    <style>
        /* Design-system tokens - copied verbatim from site/src/styles.css /
           frontend/admin/src/styles.css so this page reads as a sibling. */
        :root {
            --surface-1: #fcfcfb;
            --page: #f9f9f7;
            --ink: #0b0b0b;
            --ink-2: #52514e;
            --muted: #898781;
            --grid: #e1e0d9;
            --baseline: #c3c2b7;
            --border: rgba(11, 11, 11, 0.1);
            --accent: #2a78d6;

            --cell-1: #2a78d6;
            --cell-2: #1baf7a;
            --cell-3: #eda100;
            --cell-4: #4a3aa7;
            --cell-5: #e87ba4;
            --cell-6: #eb6834;
            --cell-7: #008300;
            --cell-8: #104281;

            --good: #0ca30c;
            --critical: #d03b3b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --surface-1: #1a1a19;
                --page: #0d0d0d;
                --ink: #ffffff;
                --ink-2: #c3c2b7;
                --muted: #898781;
                --grid: #2c2c2a;
                --baseline: #383835;
                --border: rgba(255, 255, 255, 0.1);
                --accent: #3987e5;

                --cell-1: #3987e5;
                --cell-2: #199e70;
                --cell-3: #c98500;
                --cell-4: #9085e9;
                --cell-5: #d55181;
                --cell-6: #d95926;
                --cell-7: #008300;
                --cell-8: #86b6ef;

                --good: #0ca30c;
                --critical: #e66767;
            }
        }

        /* Manual theme override (set by the site's ThemeToggle via the shared
           localStorage key): the attribute selectors outrank the media blocks,
           so an explicit choice wins in both directions. */
        :root[data-theme='light'] {
            --surface-1: #fcfcfb;
            --page: #f9f9f7;
            --ink: #0b0b0b;
            --ink-2: #52514e;
            --muted: #898781;
            --grid: #e1e0d9;
            --baseline: #c3c2b7;
            --border: rgba(11, 11, 11, 0.1);
            --accent: #2a78d6;

            --cell-1: #2a78d6;
            --cell-2: #1baf7a;
            --cell-3: #eda100;
            --cell-4: #4a3aa7;
            --cell-5: #e87ba4;
            --cell-6: #eb6834;
            --cell-7: #008300;
            --cell-8: #104281;

            --good: #0ca30c;
            --critical: #d03b3b;
        }

        :root[data-theme='dark'] {
            --surface-1: #1a1a19;
            --page: #0d0d0d;
            --ink: #ffffff;
            --ink-2: #c3c2b7;
            --muted: #898781;
            --grid: #2c2c2a;
            --baseline: #383835;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3987e5;

            --cell-1: #3987e5;
            --cell-2: #199e70;
            --cell-3: #c98500;
            --cell-4: #9085e9;
            --cell-5: #d55181;
            --cell-6: #d95926;
            --cell-7: #008300;
            --cell-8: #86b6ef;

            --good: #0ca30c;
            --critical: #e66767;
        }

        * { box-sizing: border-box; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
            }
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--page);
            color: var(--ink);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- Demo banner (matches the admin dashboard) ---------- */
        .demo-banner {
            position: sticky;
            top: 0;
            z-index: 20;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0 1.5rem;
            background: color-mix(in srgb, var(--surface-1) 92%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .banner-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 0.88rem;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .banner-menu { position: relative; }

        .banner-menu-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--ink);
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.26rem 0.7rem;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .banner-menu-btn:hover { border-color: var(--baseline); }

        .banner-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            min-width: 200px;
            display: flex;
            flex-direction: column;
            padding: 0.35rem;
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 12px 32px -16px rgba(11, 11, 11, 0.35);
            z-index: 30;
            text-align: left;
        }

        .banner-dropdown a {
            padding: 0.42rem 0.75rem;
            border-radius: 7px;
            color: var(--ink);
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            white-space: nowrap;
        }

        .banner-dropdown a:hover {
            background: color-mix(in srgb, var(--accent) 10%, transparent);
        }

        /* the class display:flex outranks the UA [hidden] rule */
        .banner-dropdown[hidden] { display: none; }

        /* ---------- Page shell ---------- */
        .wrap {
            max-width: 560px;
            margin: 0 auto;
            padding: 2.5rem 1.25rem 5rem;
            text-align: center;
        }

        .ring-mark {
            display: block;
            margin: 0 auto 1.1rem;
        }

        .kicker {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1 {
            font-size: clamp(1.7rem, 5vw, 2.2rem);
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0.3rem 0 0.6rem;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            margin: 1rem 0 0;
            min-height: 1.6rem;
        }

        .spinner {
            border: 3px solid var(--grid);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            animation: spin 1s linear infinite;
            margin: 1.25rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ---------- Routing story ---------- */
        .cell-info-panel {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.4rem;
            margin-top: 1.25rem;
            box-shadow: 0 1px 2px rgba(11, 11, 11, 0.03), 0 12px 32px -20px rgba(11, 11, 11, 0.18);
            animation: fadeIn 0.5s ease-in;
            text-align: left;
        }

        @media (prefers-color-scheme: dark) {
            .cell-info-panel { box-shadow: none; }
        }
        :root[data-theme='dark'] .cell-info-panel { box-shadow: none; }
        :root[data-theme='light'] .cell-info-panel {
            box-shadow: 0 1px 2px rgba(11, 11, 11, 0.03), 0 12px 32px -20px rgba(11, 11, 11, 0.18);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cell-info-panel h2 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0 0 0.75rem;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
        }

        .route-story {
            border: 1px solid var(--grid);
            border-radius: 10px;
            overflow: hidden;
        }

        .route-story .row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.55rem 0.9rem;
            border-bottom: 1px solid var(--grid);
            font-size: 0.9rem;
        }

        .route-story .row:last-child { border-bottom: none; }

        .route-story .row .k {
            color: var(--muted);
            font-weight: 600;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .route-story .row .v {
            text-align: right;
            word-break: break-all;
        }

        .hash-chip {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.8rem;
            background: var(--page);
            border: 1px solid var(--grid);
            border-radius: 6px;
            padding: 0.1rem 0.4rem;
            word-break: break-all;
        }

        .swatch {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 3px;
            margin-right: 0.4rem;
            vertical-align: baseline;
        }

        .cell-chip {
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        /* ---------- Countdown ---------- */
        .countdown {
            font-size: 2.6rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            margin: 0.75rem 0 0.25rem;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        button {
            font: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 0.48rem 0.95rem;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--surface-1);
            color: var(--ink);
            cursor: pointer;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }

        button:hover {
            border-color: var(--baseline);
            transform: translateY(-1px);
        }

        button:active { transform: translateY(0); }

        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .error-note {
            border: 1px solid var(--grid);
            border-left: 3px solid var(--critical);
            border-radius: 10px;
            padding: 0.9rem 1rem;
            margin-top: 1rem;
            color: var(--ink-2);
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            text-align: left;
        }

        .error-note p { margin: 0; display: flex; align-items: center; gap: 0.45rem; }

        svg.icon { vertical-align: -3px; flex: none; }

        @media (max-width: 480px) {
            .route-story .row { flex-direction: column; align-items: flex-start; gap: 0.1rem; }
            .route-story .row .v { text-align: left; }
        }
    </style>
</head>

    <script>
        // Plain-JS dropdown: toggles on the button, closes on outside click and
        // Escape. Entries that need the intro site hide themselves when no
        // %%INTRO_URL%% was substituted at deploy time (same pattern as the
        // router page's #introLink script).
        (function () {
            var btn = document.getElementById('bannerMenuBtn');
            var dropdown = document.getElementById('bannerDropdown');
            var menu = document.getElementById('bannerMenu');
            dropdown.querySelectorAll('a.intro-dependent').forEach(function (a) {
                var href = a.getAttribute('href') || '';
                if (href.indexOf('%%') === 0 || href === '') a.style.display = 'none';
            });
            function setOpen(open) {
                dropdown.hidden = !open;
                btn.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            btn.addEventListener('click', function () { setOpen(dropdown.hidden); });
            document.addEventListener('click', function (e) {
                if (!menu.contains(e.target)) setOpen(false);
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') setOpen(false);
            });
        })();
    </script>

    <script>
        let countdownInterval;
        let redirectTimeout;

        // EDGE_MODE ('true'/'false', substituted at deploy time): when the demo
        // runs behind the single-hostname edge distribution, the routing API is
        // reached at the relative /api base and cells at /{cellId}/ on this
        // same host - one DNS name for everything the audience touches.
        const EDGE_MODE = '%%EDGE_MODE%%' === 'true';

        // Where to send the client for a given cell: the cell's own hostname
        // normally, or the /{cellId}/ path on this host in edge mode.
        function cellHref(cellId, directUrl) {
            return EDGE_MODE ? '/' + encodeURIComponent(cellId) + '/' : directUrl;
        }

        // Get or generate client ID
        function getClientId() {
            let clientId = localStorage.getItem('cellClientId');
            if (!clientId) {
                clientId = 'client-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('cellClientId', clientId);
            }
            return clientId;
        }

        // Update status message
        function escHtml(value) {
            return String(value).replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        // Inline SVG icon snippets for the status line (thin-stroke set, same
        // language as site/src/ui/icons.tsx).
        function iconSvg(paths, size) {
            size = size || 16;
            return '<svg class="icon" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + paths + '</svg>';
        }
        const ICON_REFRESH = iconSvg('<path d="M20.5 12a8.5 8.5 0 1 1-2.6-6.1L20.5 8"/><path d="M20.5 3.5V8H16"/>');
        const ICON_CHECK = iconSvg('<circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.7 2.7L16.5 9"/>');
        const ICON_ERROR = iconSvg('<circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/>');
        const ICON_TARGET = iconSvg('<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>');

        function updateStatus(message) {
            // Status lines include inline SVG icons; user-derived values are
            // escaped by callers via escHtml before interpolation.
            document.getElementById('status').innerHTML = message;
        }

        // Show error
        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('error').innerHTML = `
                <div class="error-note">
                    <p>${ICON_ERROR} ${escHtml(message)}</p>
                    <button onclick="location.reload()">Try again</button>
                </div>
            `;
        }

        // Show countdown
        function showCountdown(seconds, targetUrl, clientId) {
            const countdownDiv = document.getElementById('countdown');
            countdownDiv.innerHTML = `
                <div class="countdown" id="countdownNumber">${seconds}</div>
                <button class="primary" onclick="skipCountdown('${targetUrl}', '${clientId}')">Skip countdown</button>
            `;

            let remaining = seconds;
            countdownInterval = setInterval(() => {
                remaining--;
                document.getElementById('countdownNumber').textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    window.location.href = `${targetUrl}?clientId=${encodeURIComponent(clientId)}`;
                }
            }, 1000);
        }

        // Skip countdown
        function skipCountdown(targetUrl, clientId) {
            if (countdownInterval) clearInterval(countdownInterval);
            if (redirectTimeout) clearTimeout(redirectTimeout);
            window.location.href = `${targetUrl}?clientId=${encodeURIComponent(clientId)}`;
        }

        // Show cell info: the "you are being routed" story - your ID, its hash
        // position, and the cell that owns that slice of the ring.
        function showCellInfo(cellData, targetUrl, clientId, color) {
            const hashRow = typeof cellData.hashValue === 'number'
                ? `<div class="row"><span class="k">Hash position</span>
                       <span class="v"><span class="hash-chip">md5("${escHtml(clientId)}") → ${cellData.hashValue.toLocaleString()}</span></span></div>`
                : '';
            document.getElementById('cellInfo').innerHTML = `
                <div class="cell-info-panel">
                    <h2>${ICON_CHECK} Cell assigned</h2>
                    <div class="route-story">
                        <div class="row"><span class="k">Your client ID</span>
                            <span class="v"><span class="hash-chip">${escHtml(clientId)}</span></span></div>
                        ${hashRow}
                        <div class="row"><span class="k">Target cell</span>
                            <span class="v cell-chip"><span class="swatch" style="background:${color}"></span>${escHtml(cellData.targetCell.cellId)}</span></div>
                        <div class="row"><span class="k">Region · AZ</span>
                            <span class="v">${escHtml(cellData.targetCell.region)} · ${escHtml(cellData.targetCell.availabilityZone)}</span></div>
                    </div>
                </div>
            `;

            showCountdown(5, targetUrl, clientId);
        }

        // Route to appropriate cell
        async function routeToCell() {
            const clientId = getClientId();
            updateStatus(`${ICON_REFRESH} Routing ${escHtml(clientId)} to optimal cell...`);

            try {
                // ROUTING_API_URL is substituted by infrastructure/scripts/deploy-frontend.sh
                // from the routing stack's API endpoint at deploy time. In edge
                // mode the API lives at the relative /api base on this host.
                const apiUrl = EDGE_MODE
                    ? '/api'
                    : (window.location.hostname === 'localhost'
                        ? 'http://localhost:3000/prod'
                        : '%%ROUTING_API_URL%%');

                // Get routing decision
                const response = await fetch(`${apiUrl}/admin/client-route/${clientId}`);
                if (!response.ok) {
                    throw new Error('Routing service unavailable');
                }

                const routingData = await response.json();

                // Get cell URLs to determine redirect target
                const cellUrlsResponse = await fetch(`${apiUrl}/admin/cell-urls`);
                if (!cellUrlsResponse.ok) {
                    throw new Error('Unable to fetch cell URLs');
                }

                const cellUrlsData = await cellUrlsResponse.json();
                const targetCell = cellUrlsData.cellUrls.find(
                    cell => cell.cellId === routingData.targetCell.cellId
                );

                if (!targetCell || !targetCell.active) {
                    throw new Error('Target cell is not available');
                }

                // Stable cellId -> palette color: sorted cellId order over all
                // known cells (mirrors makeCellColors in the admin dashboard).
                const sorted = cellUrlsData.cellUrls.map(c => c.cellId).sort();
                const idx = sorted.indexOf(targetCell.cellId);
                const color = 'var(--cell-' + ((idx >= 0 ? idx : 0) % 8 + 1) + ')';

                document.getElementById('spinner').style.display = 'none';
                updateStatus(`${ICON_TARGET} Redirecting to ${escHtml(targetCell.cellId)} in...`);
                showCellInfo(routingData, cellHref(targetCell.cellId, targetCell.directUrl), clientId, color);

            } catch (error) {
                console.error('Routing error:', error);
                showError(error.message || 'Unable to route to cell');
            }
        }

        // Start routing immediately on page load
        window.addEventListener('load', routeToCell);
    </script>
    <script src="/demo-panel-embed.js"></script>
</body>
</html>
