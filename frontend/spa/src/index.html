<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cell Architecture Demo</title>
    <script>
        // Anti-flash: apply a manually forced theme before first paint (same
        // pattern and localStorage key as the educational site and admin).
        try {
            var t = localStorage.getItem('cells-theme');
            if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
        } catch (e) {}
    </script>
    <style>
        /* Pre-hydration page color; matches --page in styles.css */
        body {
            margin: 0;
            background: #f9f9f7;
            min-height: 100vh;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0d0d0d; }
        }
        :root[data-theme='light'] body { background: #f9f9f7; }
        :root[data-theme='dark'] body { background: #0d0d0d; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="/demo-panel-embed.js"></script>
</body>
</html>
