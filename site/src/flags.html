<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Cell-Based Architecture — Feature flags</title>
  <script>
    // Anti-flash: apply a manually forced theme (ThemeToggle) before first paint.
    try {
      var t = localStorage.getItem('cells-theme');
      if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
