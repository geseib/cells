AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Optional "edge mode" for the cell demo: ONE CloudFront distribution that
  fronts every audience-facing endpoint under a single hostname
  ({EdgeSubdomain}.{DomainName}) so proxy-restricted audiences only need one
  DNS name allowlisted. LIMIT: up to 8 cells (CellId1..CellId8 parameter
  slots, empty = unused). Deploy in us-east-1 only (the ACM certificate is
  created in-stack and CloudFront certificates must live in us-east-1).

# Path map (a viewer-request CloudFront Function strips the routing prefix):
#   /               -> admin bucket (router.html is the default root object;
#                      /auto.html and the admin dashboard /index.html too)
#   /api/*          -> the routing API custom domain (api.{DomainName})
#   /{cellId}/*     -> that cell's CloudFront distribution
#   /{cellId}/api/* -> that cell's execute-api endpoint (rewritten to /prod/*)
#
# Deliberate trade-off (documented in README): this distribution is a shared
# dependency for client traffic - exactly the "central router" topology the
# demo's trade-offs discussion warns about - chosen for demo convenience.
# The cells themselves stay isolated from each other behind it.

Parameters:
  ProjectName:
    Type: String
    Default: cell-demo
  DomainName:
    Type: String
    Description: Base domain of the demo (e.g., cells.example.com)
  EdgeSubdomain:
    Type: String
    Default: go
    Description: Subdomain for the single edge hostname (e.g., "go")
  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID for the domain (cert DNS validation + alias records)
  AdminBucketRegionalDomainName:
    Type: String
    Description: >
      Regional domain name of the admin UI bucket from the routing stack
      (e.g., {project}-admin-ui-{account}.s3.us-east-1.amazonaws.com).
  AdminOriginAccessIdentity:
    Type: String
    Description: >
      The routing stack's CloudFront Origin Access Identity ID (AdminOAI
      output). Reused here so the admin bucket policy already grants this
      distribution read access.
  CellId1:
    Type: String
    Default: ''
    Description: Cell 1 id (e.g., us-east-1-az1); empty = slot unused
  CellPageOrigin1:
    Type: String
    Default: ''
    Description: Cell 1 CloudFront domain (e.g., d123.cloudfront.net)
  CellApiOrigin1:
    Type: String
    Default: ''
    Description: Cell 1 execute-api host (e.g., abc123.execute-api.us-west-2.amazonaws.com)
  CellId2:
    Type: String
    Default: ''
    Description: Cell 2 id (e.g., us-east-1-az1); empty = slot unused
  CellPageOrigin2:
    Type: String
    Default: ''
    Description: Cell 2 CloudFront domain (e.g., d123.cloudfront.net)
  CellApiOrigin2:
    Type: String
    Default: ''
    Description: Cell 2 execute-api host (e.g., abc123.execute-api.us-west-2.amazonaws.com)
  CellId3:
    Type: String
    Default: ''
    Description: Cell 3 id (e.g., us-east-1-az1); empty = slot unused
  CellPageOrigin3:
    Type: String
    Default: ''
    Description: Cell 3 CloudFront domain (e.g., d123.cloudfront.net)
  CellApiOrigin3:
    Type: String
    Default: ''
    Description: Cell 3 execute-api host (e.g., abc123.execute-api.us-west-2.amazonaws.com)
  CellId4:
    Type: String
    Default: ''
    Description: Cell 4 id (e.g., us-east-1-az1); empty = slot unused
  CellPageOrigin4:
    Type: String
    Default: ''
    Description: Cell 4 CloudFront domain (e.g., d123.cloudfront.net)
  CellApiOrigin4:
    Type: String
    Default: ''
    Description: Cell 4 execute-api host (e.g., abc123.execute-api.us-west-2.amazonaws.com)
  CellId5:
    Type: String
    Default: ''
    Description: Cell 5 id (e.g., us-east-1-az1); empty = slot unused
  CellPageOrigin5:
    Type: String
    Default: ''
    Description: Cell 5 CloudFront domain (e.g., d123.cloudfront.net)
  CellApiOrigin5:
    Type: String
    Default: ''
    Description: Cell 5 execute-api host (e.g., abc123.execute-api.us-west-2.amazonaws.com)
  CellId6:
    Type: String
    Default: ''
