              DomainName: !Ref CellApiOrigin8
              OriginPath: '/prod'
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
        DefaultCacheBehavior:
          TargetOriginId: AdminS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
        CacheBehaviors:
          # Global routing API - no caching, forward everything except Host
          # (API Gateway requires the origin's own Host header).
          - PathPattern: '/api/*'
            TargetOriginId: RoutingApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # Managed-AllViewerExceptHostHeader
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt PrefixStripFunction.FunctionMetadata.FunctionARN
          # Per-cell API behaviors must precede the per-cell page behaviors:
          # CloudFront evaluates cache behaviors in order and /{cellId}/*
          # would otherwise swallow /{cellId}/api/*.
          - !If
            - HasCell1
            - PathPattern: !Sub '/${CellId1}/api/*'
              TargetOriginId: CellApiOrigin1
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # Managed-AllViewerExceptHostHeader
              FunctionAssociations:
                - EventType: viewer-request
