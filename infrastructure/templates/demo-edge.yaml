              DomainName: !Ref CellPageOrigin8
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell8
