              DomainName: !Ref CellPageOrigin6
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell6
            - Id: CellApiOrigin6
              DomainName: !Ref CellApiOrigin6
              OriginPath: '/prod'
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell7
            - Id: CellPageOrigin7
              DomainName: !Ref CellPageOrigin7
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell7
