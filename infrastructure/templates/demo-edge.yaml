              DomainName: !Ref CellApiOrigin7
              OriginPath: '/prod'
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell8
