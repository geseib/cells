  EdgeAliasRecordA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${EdgeSubdomain}.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt EdgeDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID

  EdgeAliasRecordAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${EdgeSubdomain}.${DomainName}'
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt EdgeDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID

Outputs:
