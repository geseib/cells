  CellId7:
    Type: String
    Default: ''
    Description: Cell 7 id (e.g., us-east-1-az1); empty = slot unused
  CellPageOrigin7:
    Type: String
    Default: ''
    Description: Cell 7 CloudFront domain (e.g., d123.cloudfront.net)
  CellApiOrigin7:
    Type: String
    Default: ''
    Description: Cell 7 execute-api host (e.g., abc123.execute-api.us-west-2.amazonaws.com)
  CellId8:
    Type: String
    Default: ''
    Description: Cell 8 id (e.g., us-east-1-az1); empty = slot unused
  CellPageOrigin8:
    Type: String
    Default: ''
    Description: Cell 8 CloudFront domain (e.g., d123.cloudfront.net)
  CellApiOrigin8:
    Type: String
    Default: ''
    Description: Cell 8 execute-api host (e.g., abc123.execute-api.us-west-2.amazonaws.com)

Conditions:
  HasCell1: !Not [!Equals [!Ref CellId1, '']]
  HasCell2: !Not [!Equals [!Ref CellId2, '']]
  HasCell3: !Not [!Equals [!Ref CellId3, '']]
  HasCell4: !Not [!Equals [!Ref CellId4, '']]
  HasCell5: !Not [!Equals [!Ref CellId5, '']]
  HasCell6: !Not [!Equals [!Ref CellId6, '']]
  HasCell7: !Not [!Equals [!Ref CellId7, '']]
  HasCell8: !Not [!Equals [!Ref CellId8, '']]

Resources:
  # Certificate for the edge hostname - created in-stack because this stack
  # is only ever deployed to us-east-1 (CloudFront requirement), same pattern
  # as cell-certificate.yaml.
  EdgeCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub '${EdgeSubdomain}.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub '${EdgeSubdomain}.${DomainName}'
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Viewer-request function: strips the routing prefix before the request is
  # forwarded to the origin. Associated with every behavior EXCEPT the
  # default (admin bucket paths pass through unchanged):
  #   /api/<x>           -> /<x>        (routing API custom domain serves at /)
  #   /{cellId}/api/<x>  -> /<x>        (the cell API origin adds /prod via OriginPath)
  #   /{cellId}/<x>      -> /<x>        (the cell distribution serves the SPA at /)
  PrefixStripFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${ProjectName}-edge-prefix-strip'
      AutoPublish: true
      FunctionConfig:
        Comment: Strip /api or /{cellId}[/api] path prefixes for origin routing
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          // Global routing API: /api/* -> /*
          if (uri === '/api' || uri.indexOf('/api/') === 0) {
            request.uri = uri.substring(4) || '/';
            return request;
          }
          // Cell paths: drop the leading /{cellId}
          var i = uri.indexOf('/', 1);
          var rest = i === -1 ? '/' : uri.substring(i);
          // Cell API: /{cellId}/api/* -> /* (OriginPath prepends /prod)
          if (rest === '/api' || rest.indexOf('/api/') === 0) {
            request.uri = rest.substring(4) || '/';
          } else {
            request.uri = rest;
          }
          return request;
        }

  EdgeDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub 'Single-hostname edge for ${ProjectName} (audience traffic)'
        Enabled: true
        IPV6Enabled: true
        PriceClass: PriceClass_100
        # Router page as the landing page for the bare hostname (the QR code
        # target). deploy-frontend.sh uploads it to the admin bucket as
        # router.html; the admin dashboard stays at /index.html.
        DefaultRootObject: router.html
        Aliases:
          - !Sub '${EdgeSubdomain}.${DomainName}'
        ViewerCertificate:
          AcmCertificateArn: !Ref EdgeCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: AdminS3Origin
            DomainName: !Ref AdminBucketRegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${AdminOriginAccessIdentity}'
          - Id: RoutingApiOrigin
            DomainName: !Sub 'api.${DomainName}'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
          - !If
            - HasCell1
            - Id: CellPageOrigin1
              DomainName: !Ref CellPageOrigin1
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell1
            - Id: CellApiOrigin1
              DomainName: !Ref CellApiOrigin1
              OriginPath: '/prod'
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell2
            - Id: CellPageOrigin2
              DomainName: !Ref CellPageOrigin2
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell2
            - Id: CellApiOrigin2
              DomainName: !Ref CellApiOrigin2
              OriginPath: '/prod'
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell3
            - Id: CellPageOrigin3
              DomainName: !Ref CellPageOrigin3
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell3
            - Id: CellApiOrigin3
              DomainName: !Ref CellApiOrigin3
              OriginPath: '/prod'
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell4
            - Id: CellPageOrigin4
              DomainName: !Ref CellPageOrigin4
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
            - HasCell4
            - Id: CellApiOrigin4
              DomainName: !Ref CellApiOrigin4
              OriginPath: '/prod'
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
            - !Ref 'AWS::NoValue'
          - !If
