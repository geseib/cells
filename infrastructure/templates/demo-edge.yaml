    Value: !Sub 'https://${EdgeSubdomain}.${DomainName}'
    Description: Single audience-facing hostname (router page at /)
  EdgeDistributionDomainName:
    Value: !GetAtt EdgeDistribution.DomainName
    Description: CloudFront domain of the edge distribution
  EdgeDistributionId:
    Value: !Ref EdgeDistribution
    Description: CloudFront distribution ID (for cache invalidations)
