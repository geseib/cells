AWSTemplateFormatVersion: '2010-09-09'
Description: Static hosting for the educational site (S3 + CloudFront + custom domain)

Parameters:
  ProjectName:
    Type: String
    Default: cell-demo
  SiteDomainName:
    Type: String
    Description: Full domain for the educational site (e.g., cellintro.example.com)
  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID for the domain

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-site-${AWS::AccountId}'

  SiteOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for ${ProjectName} educational site'

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${SiteOAI}'
            Action: 's3:GetObject'
            Resource: !Sub '${SiteBucket.Arn}/*'

  # This stack must be deployed in us-east-1 (CloudFront certificate requirement)
  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref SiteDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref SiteDomainName
          HostedZoneId: !Ref HostedZoneId

  SiteCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub 'Educational site for ${ProjectName}'
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${SiteOAI}'
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref SiteDomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS]
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
        PriceClass: PriceClass_100

  SiteRoute53Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref SiteDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteCloudFront.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID

Outputs:
  SiteBucket:
    Value: !Ref SiteBucket
    Description: S3 bucket for the educational site content
  SiteUrl:
    Value: !Sub 'https://${SiteDomainName}'
    Description: Educational site URL
  SiteCloudFrontUrl:
    Value: !Sub 'https://${SiteCloudFront.DomainName}'
    Description: CloudFront URL (works before DNS propagates)
